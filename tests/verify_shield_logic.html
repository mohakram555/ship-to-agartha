<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shield Logic Verification</title>
    <style>
        body { background: #111; color: #eee; font-family: sans-serif; padding: 20px; }
        .pass { color: #4f4; }
        .fail { color: #f44; }
    </style>
</head>
<body>
    <h1>Shield Upgrade Logic Verification</h1>
    <div id="results"></div>

    <script>
        // Mock GameState
        const GameState = {
            upgrades: {
                shield: 0
            },
            shield: {
                current: 100,
                max: 100,
                flashTimer: 0
            }
        };

        // Mock failLevel
        let levelFailed = false;
        function failLevel() {
            levelFailed = true;
        }

        // Logic from js/main.js
        function damageShield(amount) {
            // Apply Shield Upgrade Resistance (5% per level)
            const resistance = GameState.upgrades.shield * 0.05;
            const finalDamage = Math.max(1, amount * (1 - resistance)); // Min 1 damage

            GameState.shield.current = Math.max(0, GameState.shield.current - finalDamage);
            GameState.shield.flashTimer = 0.3; // Flash red when hit

            // Shield depleted = mission failed
            if (GameState.shield.current <= 0) {
                failLevel();
            }
        }

        // Test Runner
        const results = document.getElementById('results');

        function assert(condition, message) {
            const div = document.createElement('div');
            if (condition) {
                div.className = 'pass';
                div.textContent = `PASS: ${message}`;
            } else {
                div.className = 'fail';
                div.textContent = `FAIL: ${message}`;
                console.error(`FAIL: ${message}`);
            }
            results.appendChild(div);
        }

        function runTests() {
            // Test 1: Level 0 (0% resistance)
            GameState.upgrades.shield = 0;
            GameState.shield.current = 100;
            damageShield(20);
            assert(GameState.shield.current === 80, `Level 0: 100 - 20 = 80 (Actual: ${GameState.shield.current})`);

            // Test 2: Level 1 (5% resistance)
            GameState.upgrades.shield = 1;
            GameState.shield.current = 100;
            damageShield(20);
            // 20 * (1 - 0.05) = 20 * 0.95 = 19
            assert(GameState.shield.current === 81, `Level 1: 100 - 19 = 81 (Actual: ${GameState.shield.current})`);

            // Test 3: Level 10 (50% resistance)
            GameState.upgrades.shield = 10;
            GameState.shield.current = 100;
            damageShield(20);
            // 20 * 0.5 = 10
            assert(GameState.shield.current === 90, `Level 10: 100 - 10 = 90 (Actual: ${GameState.shield.current})`);

            // Test 4: Min Damage Cap
            GameState.upgrades.shield = 10;
            GameState.shield.current = 100;
            damageShield(1);
            // 1 * 0.5 = 0.5, but max(1, 0.5) = 1
            assert(GameState.shield.current === 99, `Min Damage: 100 - 1 = 99 (Actual: ${GameState.shield.current})`);

            // Test 5: Game Over
            GameState.upgrades.shield = 0;
            GameState.shield.current = 10;
            levelFailed = false;
            damageShield(20);
            assert(GameState.shield.current === 0, `Shield Depleted: 0 (Actual: ${GameState.shield.current})`);
            assert(levelFailed === true, `Level Failed Flag Set`);
        }

        runTests();
    </script>
</body>
</html>
